name: taskmanagement

services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    container_name: taskmanagement-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskmanagement-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      ConnectionStrings__Redis: redis:6379,abortConnect=false
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      BootstrapAdmin__Enabled: ${BOOTSTRAP_ADMIN_ENABLED:-false}
      BootstrapAdmin__Email: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BootstrapAdmin__UserName: ${BOOTSTRAP_ADMIN_USERNAME:-}
      BootstrapAdmin__Password: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      BootstrapAdmin__DisplayName: ${BOOTSTRAP_ADMIN_DISPLAY_NAME:-}
      Database__MigrateOnStartup: "true"
      FileStorage__Local__RootPath: /app/App_Data/attachments
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - taskmanagement-attachments:/app/App_Data/attachments
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:18
    container_name: taskmanagement-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - taskmanagement-postgres-data:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: taskmanagement-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    # The Redis host port is intentionally NOT published by default (B10-09): the API
    # reaches it over the compose network as redis:6379, so exposing it to the host only
    # widens the attack surface. If host access is needed for local debugging, create a
    # private compose override and do not commit it.
    volumes:
      - taskmanagement-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  taskmanagement-postgres-data:
  taskmanagement-redis-data:
  taskmanagement-attachments:
