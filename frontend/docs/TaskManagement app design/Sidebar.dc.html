<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="width:100%;height:100%;display:flex;flex-direction:column;background:#fbfcfd;border-right:1px solid #e2e8f0;font-family:Inter,system-ui,sans-serif;box-sizing:border-box">
  <div style="display:flex;align-items:center;gap:8px;padding:14px 16px 10px">
    <div style="width:22px;height:22px;border-radius:6px;background:#0f766e;display:flex;align-items:center;justify-content:center;flex:none">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"></path></svg>
    </div>
    <div style="font-size:14px;font-weight:700;color:#0f172a;letter-spacing:-0.01em">TaskManagement</div>
  </div>
  <div style="padding:6px 12px 4px">
    <button aria-label="Proje değiştir" style="width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;padding:7px 10px;border:1px solid #d8e0e8;border-radius:6px;background:#ffffff;font-family:inherit;font-size:13px;font-weight:600;color:#0f172a;cursor:pointer;text-align:left;box-sizing:border-box">
      <span style="display:flex;align-items:center;gap:8px;min-width:0">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0f766e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex:none"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"></path></svg>
        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">{{ project }}</span>
      </span>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex:none"><path d="m7 15 5 5 5-5"></path><path d="m7 9 5-5 5 5"></path></svg>
    </button>
  </div>
  <nav aria-label="Proje gezinimi" style="display:flex;flex-direction:column;gap:2px;padding:8px 12px">
    <a href="#" style="{{ overviewStyle }}">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex:none"><rect width="7" height="9" x="3" y="3" rx="1"></rect><rect width="7" height="5" x="14" y="3" rx="1"></rect><rect width="7" height="9" x="14" y="12" rx="1"></rect><rect width="7" height="5" x="3" y="16" rx="1"></rect></svg>
      Genel Bakış
    </a>
    <a href="#" style="{{ tasksStyle }}">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex:none"><rect width="6" height="6" x="3" y="5" rx="1"></rect><path d="m3 17 2 2 4-4"></path><path d="M13 6h8"></path><path d="M13 12h8"></path><path d="M13 18h8"></path></svg>
      Görevler
    </a>
    <a href="#" style="{{ membersStyle }}">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex:none"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
      Üyeler
    </a>
  </nav>
  <sc-if value="{{ superAdmin }}" hint-placeholder-val="{{ false }}">
    <div style="padding:12px 12px 0;display:flex;flex-direction:column;gap:4px">
      <div style="font-size:10px;font-weight:700;color:#94a3b8;letter-spacing:0.08em;text-transform:uppercase;padding:0 10px">Yönetim</div>
      <a href="#" style="{{ adminStyle }}">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex:none"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"></path></svg>
        Kullanıcılar
      </a>
    </div>
  </sc-if>
  <div style="margin-top:auto;border-top:1px solid #e8edf2;padding:12px;display:flex;align-items:center;gap:10px">
    <div style="width:28px;height:28px;border-radius:6px;background:#e0efec;color:#0f766e;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex:none">AD</div>
    <div style="min-width:0;flex:1">
      <div style="font-size:12.5px;font-weight:600;color:#0f172a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">Ayşe Demir</div>
      <div style="font-size:11px;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">@aysedemir</div>
    </div>
    <button aria-label="Hesap menüsü" title="Hesap menüsü" style="border:none;background:transparent;cursor:pointer;padding:4px;border-radius:6px;display:flex;flex:none">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"></circle><circle cx="19" cy="12" r="1"></circle><circle cx="5" cy="12" r="1"></circle></svg>
    </button>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:232,&quot;height&quot;:720},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;overview&quot;,&quot;tasks&quot;,&quot;members&quot;,&quot;admin&quot;],&quot;default&quot;:&quot;overview&quot;,&quot;tsType&quot;:&quot;'overview'|'tasks'|'members'|'admin'&quot;},&quot;project&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Web Sitesi Yenileme&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;superAdmin&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const base = {display:'flex',alignItems:'center',gap:'10px',padding:'8px 10px',borderRadius:'6px',fontSize:'13px',fontWeight:500,color:'#475569',textDecoration:'none'};
    const on = Object.assign({}, base, {background:'#e0efec',color:'#0f766e',fontWeight:600});
    const a = this.props.active ?? 'overview';
    return {
      project: this.props.project ?? 'Web Sitesi Yenileme',
      superAdmin: this.props.superAdmin ?? false,
      adminStyle: a === 'admin' ? on : base,
      overviewStyle: a === 'overview' ? on : base,
      tasksStyle: a === 'tasks' ? on : base,
      membersStyle: a === 'members' ? on : base
    };
  }
}
</script>
</body>
</html>
